<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand" routerLink="/dashboard">
      <i class="bi bi-check-circle me-2"></i>Task Manager
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/dashboard"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/projects"
            routerLinkActive="active"
          >
            <i class="bi bi-folder me-1"></i>Projects
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/tasks"
            routerLinkActive="active"
          >
            <i class="bi bi-list-check me-1"></i>My Tasks
          </a>
        </li>
        @if (authService.isAdmin()) {
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin"
              routerLinkActive="active"
            >
              <i class="bi bi-gear me-1"></i>Admin
            </a>
          </li>
        }
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            href="#"
            id="navbarDropdown"
            role="button"
            data-bs-toggle="dropdown"
          >
            <i class="bi bi-person-circle me-1"></i>
            {{ authService.currentUser()?.firstName }}
          </a>
          <ul class="dropdown-menu dropdown-menu-end" [attr.aria-labelledby]="'navbarDropdown'">
            <li>
              <a class="dropdown-item" href="#" (click)="logout($event)">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid mt-4">
  <ng-content></ng-content>
</main>
