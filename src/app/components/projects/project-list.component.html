<app-layout>
  <div class="row mb-4">
    <div class="col-12 d-flex justify-content-between align-items-center">
      <h1>Projects</h1>
      <a href="#" class="btn btn-primary" (click)="onCreateNew($event)">
        <i class="bi bi-plus-circle me-2"></i>New Project
      </a>
    </div>
  </div>

  @if (isLoading()) {
    <div class="text-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  } @else if (projects().length === 0) {
    <div class="alert alert-info">
      <i class="bi bi-info-circle me-2"></i>No projects yet. Create one to get started!
    </div>
  } @else {
    <div class="row">
      @for (project of projects(); track project.id) {
        <div class="col-md-6 col-lg-4 mb-4">
          <div class="card project-card h-100">
            <div class="card-body">
              <h5 class="card-title">{{ project.name }}</h5>
              <p class="card-text text-muted">{{ project.description }}</p>
              <div class="mb-3">
                <small class="text-muted">
                  <i class="bi bi-people me-1"></i>{{ project.members.length }} members
                </small>
              </div>
            </div>
            <div class="card-footer bg-transparent">
              <a
                [routerLink]="['/projects', project.id]"
                class="btn btn-sm btn-outline-primary me-2"
              >
                <i class="bi bi-eye me-1"></i>View
              </a>
              <a
                href="#"
                class="btn btn-sm btn-outline-danger"
                (click)="onDelete(project.id, $event)"
              >
                <i class="bi bi-trash me-1"></i>Delete
              </a>
            </div>
          </div>
        </div>
      }
    </div>
  }
</app-layout>
